<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Buddy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>HR Buddy</h1>
            <p class="subtitle">Трекер адаптации</p>
        </header>

        <div id="app">
            <div class="nav-tabs">
                <button class="tab active" data-tab="today">Сегодня</button>
                <button class="tab" data-tab="history">История</button>
                <button class="tab" data-tab="stats">Статистика</button>
            </div>

            <div id="today" class="page active">
                <h2>Чек-лист на сегодня</h2>
                <div id="checklist"></div>
                <div class="mood-section">
                    <h3>Как настроение?</h3>
                    <div class="mood-buttons">
                        <button class="mood-btn" data-mood="1">😫</button>
                        <button class="mood-btn" data-mood="2">😕</button>
                        <button class="mood-btn" data-mood="3">😐</button>
                        <button class="mood-btn" data-mood="4">🙂</button>
                        <button class="mood-btn" data-mood="5">😊</button>
                    </div>
                    <p id="mood-status"></p>
                </div>
                <button id="save-btn" class="primary-btn">Сохранить день</button>
            </div>

            <div id="history" class="page">
                <h2>История</h2>
                <div id="history-list"></div>
            </div>

            <div id="stats" class="page">
                <h2>Статистика</h2>
                <div id="stats-content"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
